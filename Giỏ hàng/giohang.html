<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Giỏ hàng</title>
</head>
<body>
    <h1 class="text-center fw-bold">Giỏ hàng</h1>

    <section class="about-us py-5">
        <div class="container border border-2 border-dark rounded-3">
            <div class="row gy-4 py-3">
                <div class="col-12 col-md-6 col-lg-8">
                    <div class="py-3 border bg-light text-center">Nội dung 1</div>
                </div>
                <div class="col-12 col-md-8 col-lg-2 border bg-light"> 
                    <div class="py-2 px-3 d-flex align-items-center gap-3 flex-nowrap">
                        <div class="price mb-0" id="price-display">1000000</div>
                        <div class="quantity d-flex align-items-center gap-2">
                            <input class="text-center input-qty" type="number" name="quantity[]" value="1" min="1" max="20" step="1">
                            <button type="button" class="btn-delete rounded-3">Xóa</button>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-6 col-lg-2">
                    <div class="py-3 border bg-light text-center">Nội dung 3</div>
                </div>
            </div>
            <div class="row gy-4 py-3">
                <div class="col-12 col-md-6 col-lg-8">
                    <div class="py-3 border bg-light text-center">Nội dung 1</div>
                </div>
                <div class="col-12 col-md-8 col-lg-2 border bg-light"> 
                    <div class="py-2 px-3 d-flex align-items-center gap-3 flex-nowrap">
                        <div class="price mb-0" id="price-display">1000000</div>
                        <div class="quantity d-flex align-items-center gap-2">
                            <input class="text-center input-qty" type="number" name="quantity[]" value="1" min="1" max="20" step="1">
                            <button type="button" class="btn-delete rounded-3">Xóa</button>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-6 col-lg-2">
                    <div class="py-3 border bg-light text-center">Nội dung 3</div>
                </div>
            </div>
        </div>
    </section>

    <section>
        <div class="container">
            <fieldset class="border p-4">
                <legend class="float-none w-auto px-2 fs-3 fw-bold">
                    Thông tin giao hàng
                </legend>

                <div class="row mb-3 align-items-center">
                    <label for="nguoinhan" class="col-3 col-form-label fw-bold fs-4">
                        Người nhận hàng:
                    </label>
                    <div class="col-4">
                        <input type="text" class="form-control" id="nguoinhan">
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <label for="dienthoai" class="col-3 col-form-label fw-bold fs-4">
                        Điện thoại:
                    </label>
                    <div class="col-4">
                        <input type="text" class="form-control" id="dienthoai">
                    </div>
                </div>

                <button type="submit" class="btn btn-outline-success">
                    Thanh toán
                </button>
            </fieldset>
        </div>
    </section>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
