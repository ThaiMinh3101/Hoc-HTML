<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Trà Sữa - Dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffaf0; }
        .thumbnail-container img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
        }
        .action-btn {
            background: white;
            border: 2px solid #ffcccc;
            color: #555;
            transition: all 0.2s;
        }
        .action-btn:active { background: #ffcccc; color: white; transform: scale(0.95); }
    </style>
</head>
<body class="d-flex flex-column align-items-center pt-5">

    <div class="text-center mb-4">
        <h4 id="welcome-text" style="color: #ff9999;">Chào bạn!</h4>
    </div>

    <div class="thumbnail-container mb-5">
        <img src="https://images.unsplash.com/photo-1525804018804-06720eb991dd?q=80&w=500&auto=format&fit=crop" class="shadow-sm" alt="Hình trà sữa">
    </div>

    <div class="container px-4">
        <div class="row g-3">
            <div class="col-6">
                <button class="btn action-btn w-100 py-4 fw-bold rounded-4 shadow-sm" onclick="goToMenu()">
                    <span class="fs-1 d-block mb-2">📋</span>
                    Đặt món
                </button>
            </div>
            <div class="col-6">
                <button class="btn action-btn w-100 py-4 fw-bold rounded-4 shadow-sm" onclick="callStaff()">
                    <span class="fs-1 d-block mb-2">🙋‍♂️</span>
                    Gọi nhân viên
                </button>
            </div>
        </div>
    </div>

    <script>
        // Đọc dữ liệu đã lưu
        const urlParams = new URLSearchParams(window.location.search);
        let tableNumber = urlParams.get('table');
        let customerName = localStorage.getItem('customerName') || "Khách yêu";

        // Hiện câu chào
        document.getElementById('welcome-text').innerText = `Chào ${customerName}, bạn cần gì nè?`;

        function goToMenu() {
            // Nhảy sang Trang 3, nhớ xách theo cái bàn
            window.location.href = `page3.html?table=${tableNumber}`;
        }

        function callStaff() {
            // Sau này chỗ này sẽ viết code đẩy thông báo lên máy của thu ngân/nhân viên
            alert(`Đã gửi thông báo gọi nhân viên đến Bàn ${tableNumber}! Bạn đợi xíu nhé.`);
        }
    </script>
</body>
</html>
