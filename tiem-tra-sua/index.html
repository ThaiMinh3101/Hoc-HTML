<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Trà Sữa - Chào mừng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            /* Hình nền trà sữa full màn hình */
            background-image: url('https://images.unsplash.com/photo-1558857563-b37102e96041?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            max-width: 350px;
            width: 90%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="login-box p-5 text-center">
        <h3 class="mb-4" style="color: #ff9999;">Góc Trà Sữa 🧋</h3>
        <p id="table-display" class="fw-bold text-success mb-3">Đang kiểm tra bàn...</p>
        
        <input type="text" id="username-input" class="form-control mb-4 rounded-pill px-4" placeholder="Nhập tên của bạn...">
        <button class="btn w-100 rounded-pill fw-bold text-white" style="background-color: #ff9999;" onclick="confirmName()">Xác nhận</button>
    </div>

    <script>
        // Lấy số bàn từ URL (Ví dụ khách quét QR ra link: localhost/tra_sua_store/index.html?table=05)
        const urlParams = new URLSearchParams(window.location.search);
        let tableNumber = urlParams.get('table');

        if(tableNumber) {
            document.getElementById('table-display').innerText = "Bàn của bạn: Số " + tableNumber;
        } else {
            document.getElementById('table-display').innerText = "Vui lòng quét QR trên bàn!";
            document.getElementById('table-display').className = "fw-bold text-danger mb-3";
        }

        function confirmName() {
            const name = document.getElementById('username-input').value.trim();
            if (name === "") {
                alert("Bạn cho quán xin tên để tiện gọi món nhé!");
                return;
            }
            if (!tableNumber) {
                alert("Lỗi: Không có số bàn. Hãy quét mã QR lại nhé!");
                return;
            }

            // Lưu tên vào bộ nhớ tạm của điện thoại
            localStorage.setItem('customerName', name);
            
            // Chuyển sang Trang 2 và mang theo số bàn trên link
            window.location.href = `page2.html?table=${tableNumber}`;
        }
    </script>
</body>
</html>
