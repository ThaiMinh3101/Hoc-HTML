<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Trà Sữa - Thực đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffaf0; padding-bottom: 100px; }
        .header { background: white; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-img-top { height: 160px; object-fit: cover; }
        .price { color: #f27171; font-weight: bold; }
        .btn-add { background-color: #ffcccc; color: #444; border: none; font-weight: bold; }
        
        /* Giỏ hàng nổi */
        #cart-bar {
            background: white;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: none;
        }
        .qty-btn { width: 30px; height: 30px; padding: 0; line-height: 30px; text-align: center; }
    </style>
</head>
<body>

    <div class="header p-3 text-center mb-4 sticky-top">
        <h4 style="color: #f2a6a6; margin: 0;">Menu Quán 🧋</h4>
        <span id="table-display" class="badge bg-success rounded-pill px-3 py-2 mt-2">Bàn: ...</span>
    </div>

    <div class="container px-3">
        <div class="row row-cols-2 g-3">
            <div class="col">
                <div class="card h-100 rounded-4 shadow-sm border-0">
                    <img src="https://via.placeholder.com/300x300?text=O+Long" class="card-img-top rounded-top-4" alt="Trà sữa">
                    <div class="card-body p-2 text-center d-flex flex-column">
                        <h6 class="card-title text-secondary flex-grow-1" style="font-size: 0.9em;">Trà Sữa Ô Long</h6>
                        <p class="price mb-2" style="font-size: 0.9em;">45.000đ</p>
                        <button class="btn btn-add w-100 rounded-pill btn-sm" onclick="addToCart(1, 'Trà Sữa Ô Long', 45000)">Thêm</button>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 rounded-4 shadow-sm border-0">
                    <img src="https://via.placeholder.com/300x300?text=Ca+Vien" class="card-img-top rounded-top-4" alt="Cá viên">
                    <div class="card-body p-2 text-center d-flex flex-column">
                        <h6 class="card-title text-secondary flex-grow-1" style="font-size: 0.9em;">Mẹt Cá Viên Chiên</h6>
                        <p class="price mb-2" style="font-size: 0.9em;">65.000đ</p>
                        <button class="btn btn-add w-100 rounded-pill btn-sm" onclick="addToCart(2, 'Mẹt Cá Viên', 65000)">Thêm</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-bar" class="fixed-bottom p-3">
        <div class="d-flex justify-content-between align-items-center">
            <button class="btn p-0 text-danger fs-3" data-bs-toggle="modal" data-bs-target="#cartModal">
                🛍️ <span id="cart-badge" class="badge bg-danger rounded-circle position-absolute translate-middle" style="font-size: 0.4em; top: 20px;">0</span>
            </button>
            <div class="fw-bold fs-5">Tổng: <span id="cart-total-price" style="color: #f27171;">0</span>đ</div>
            <button class="btn btn-success rounded-pill fw-bold px-4" onclick="submitOrder()">Chốt Đơn</button>
        </div>
    </div>

    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title text-secondary">Giỏ hàng của bạn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <ul id="cart-list" class="list-group list-group-flush">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 1. Đọc số bàn và tên
        const urlParams = new URLSearchParams(window.location.search);
        let tableNumber = urlParams.get('table');
        let customerName = localStorage.getItem('customerName');

        document.getElementById('table-display').innerText = `Bàn ${tableNumber} - ${customerName}`;

        // 2. Logic Giỏ hàng
        let cart = [];

        function addToCart(id, name, price) {
            let item = cart.find(i => i.id === id);
            if (item) item.quantity++;
            else cart.push({ id, name, price, quantity: 1 });
            updateCart();
        }

        function updateQty(id, change) {
            let itemIndex = cart.findIndex(i => i.id === id);
            if (itemIndex > -1) {
                cart[itemIndex].quantity += change;
                if (cart[itemIndex].quantity <= 0) cart.splice(itemIndex, 1);
            }
            updateCart();
        }

        function updateCart() {
            let totalQty = 0;
            let totalPrice = 0;
            let listHTML = '';

            cart.forEach(item => {
                totalQty += item.quantity;
                let subTotal = item.price * item.quantity;
                totalPrice += subTotal;

                listHTML += `
                <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <div class="fw-bold">${item.name}</div>
                        <small class="text-danger">${subTotal.toLocaleString()}đ</small>
                    </div>
                    <div class="d-flex align-items-center">
                        <button class="btn btn-outline-secondary qty-btn rounded-circle" onclick="updateQty(${item.id}, -1)">-</button>
                        <span class="mx-3 fw-bold">${item.quantity}</span>
                        <button class="btn btn-outline-secondary qty-btn rounded-circle" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                </li>`;
            });

            document.getElementById('cart-list').innerHTML = listHTML;
            document.getElementById('cart-badge').innerText = totalQty;
            document.getElementById('cart-total-price').innerText = totalPrice.toLocaleString();

            const cartBar = document.getElementById('cart-bar');
            if (totalQty > 0) {
                cartBar.style.display = 'block';
            } else {
                cartBar.style.display = 'none';
                // Đóng modal nếu giỏ trống
                const modal = bootstrap.Modal.getInstance(document.getElementById('cartModal'));
                if (modal) modal.hide();
            }
        }

        function submitOrder() {
            if (cart.length === 0) return alert("Bạn chưa chọn món!");
            alert(`Đã gửi đơn hàng của ${customerName} (Bàn ${tableNumber}) xuống bếp!`);
            // Sau này gọi PHP ở đây
        }
    </script>
</body>
</html>
