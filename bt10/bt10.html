<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="bt10.css"> <!--CSS nên để dưới để tạo độ ưu tiên hơn bootstrap khi cần css cái gì đó-->
    <title>Document</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">
            <i class="fa-solid fa-house-chimney text-success"></i> PET SHOP
            </a>

            <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainMenu"
            aria-controls="mainMenu"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainMenu"> <!--collapse là để ẩn hiện menu trên mobile, navbar-collapse là để tạo hiệu ứng thu gọn-->
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                    <a class="nav-link active fw-bold text-success px-3" href="#">HOME</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link fw-bold px-3" href="#">ABOUT</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link fw-bold px-3" href="#">SERVICES</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link fw-bold px-3" href="#">PRODUCTS</a>
                    </li>

                    <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle fw-bold px-3" href="#" role="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        PAGES
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Page 1</a></li>
                        <li><a class="dropdown-item" href="#">Page 2</a></li>
                    </ul>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link bg-success text-light fw-bold px-5 py-3" href="#">
                        CONTACT <i class="fa-solid fa-arrow-right"></i>
                    </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <section class="about-us py-5"> <!-- py-5 là padding trên dưới xa ra -->
        <div class="container"> <!-- container là để căn giữa và có padding 2 bên -->
            <div class="row gy-4"> <!-- gy-4 là để tạo khoảng cách giữa các hàng -->
                <div class="col-12 col-md-6 col-lg-4"> <!-- col-12 là cho mobile, col-md-6 là trên tablet, col-lg-4 là trên desktop -->
                    <div class="py-3 border bg-light text-center">Nội dung 1</div> <!-- py-3 là để tạo padding trên dưới-->
                    <!-- border là để tạo viền, bg-light là để tạo nền sáng, text-center là để căn giữa chữ -->
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 2</div>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 3</div>
                </div>
        </div>
    </section>

    <section class="about-us py-5">
        <div class="container">
            <div class="row gy-4">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 1</div>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 2</div>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 3</div>
                </div>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
