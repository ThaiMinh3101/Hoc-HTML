<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="bt10.css"> <!--CSS nên để dưới để tạo độ ưu tiên hơn bootstrap khi cần css cái gì đó-->
    <title>Document</title>
</head>
<body>
    <div class="navbar">
        <div class="container">
            <div class="row d-flex">
                <div class="col">
                    <i class="bi bi-house"></i>
                    <a href="#" class="navbar-brand">PET SHOP</a>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <a class="nav-link active fw-bold text-success px-2" href="#">HOME</a>
                    <a class="nav-link fw-bold px-2" href="#">ABOUT</a>
                    <a class="nav-link fw-bold px-2" href="#">SERVICES</a>
                    <a class="nav-link fw-bold px-2" href="#">PRODUCTS</a>
                    <div class="dropdown">
                        <div class="dropdown-toggle fw-bold px-2" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            PAGES
                        </div>
                        <div class="dropdown-menu">
                            <a class="dropdown-item" href="#">Page 1</a>
                            <a class="dropdown-item" href="#">Page 2</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section class="about-us py-5"> <!-- py-5 là padding trên dưới xa ra -->
        <div class="container"> <!-- container là để căn giữa và có padding 2 bên -->
            <div class="row gy-4"> <!-- gy-4 là để tạo khoảng cách giữa các hàng -->
                <div class="col-12 col-md-6 col-lg-4"> <!-- col-12 là cho mobile, col-md-6 là trên tablet, col-lg-4 là trên desktop -->
                    <div class="py-3 border bg-light text-center">Nội dung 1</div> <!-- py-3 là để tạo padding trên dưới-->
                    <!-- border là để tạo viền, bg-light là để tạo nền sáng, text-center là để căn giữa chữ -->
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 2</div>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 3</div>
                </div>
        </div>
    </section>

    <section class="about-us py-5">
        <div class="container">
            <div class="row gy-4">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 1</div>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 2</div>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="py-3 border bg-light text-center">Nội dung 3</div>
                </div>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
